<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pepsi Zero</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
</head>
<body>

<!-- ================= HERO SECTION ================= -->
<section class="hero" id="home">

    <!-- HEADER -->
    <header>
        <img src="image/logo1.png" class="logo" alt="Pepsi Logo">

       
    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="product.html" class="active">Products</a>
        <a href="#">What's New</a>
        <a href="#">Newsletter</a>
        <a href="#">Contact</a>
    </nav>
    </header>

    <!-- CONTENT -->
    <div class="content">

        <div class="textBox">
            <h2>THAT'S WHAT <br><span>I LIKE</span></h2>

            <p>
                Pepsi stands as an iconic symbol of bold innovation and timeless refreshment, 
                delivering a distinctive taste that transcends generations.
            </p>

            <a href="product.html" class="btn premium-btn active">VIEW ALL PRODUCTS</a>

            <!-- SOCIAL -->
            <ul class="social">
                <li><img src="image/facebook.png" alt="Facebook"></li>
                <li><img src="image/twiter.png" alt="Twitter"></li>
                <li><img src="image/instagram.png" alt="Instagram"></li>
            </ul>
        </div>

        <div class="imgBox">
            <img src="image/background.png" class="pepsi" alt="Pepsi Can">
        </div>

    </div>
                               
<ul class="thumb">

    <li>
        <a href="product.html?product=blue-pepsi">
            <img src="image/1.png" alt="Blue Pepsi">
        </a>
    </li>

    <li>
        <a href="product.html?product=red-pepsi">
            <img src="image/2.png" alt="Red Pepsi">
        </a>
    </li>

    <li>
        <a href="product.html?product=black-pepsi">
            <img src="image/3.png" alt="Black Pepsi">
        </a>
    </li>

</ul>

</section>



<!-- ================= OTHER SECTIONS ================= -->
<section id="whatsnew"></section>
<section id="newsletter"></section>
<section id="contact"></section>

</body>
</html>
